name: Feature request
description: Suggest a new capability or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing what you'd like.
      placeholder: e.g. "Add a /clarify history command that shows recent state changes."
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What use case is this trying to solve? When does the gap bite?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behaviour
      description: How would this work from the user's perspective? Commands, flags, output, etc.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why you ruled them out (optional).
    validations:
      required: false
